# Example: iGrill V3 with 4 probes, reading temps + battery,
# and reading/WRITING each probe's alarm/target temperature.
#
# Setting the number entities below (e.g. from Home Assistant, or from
# `number.set_value` in an ESPHome automation) writes the value straight to
# the iGrill over BLE, which is what makes the grill's own buzzer go off
# when that probe reaches the target.

external_components:
  - source: components   # local path to this patched components/ folder
    # (once you've tested it, you can instead point this at your own fork:
    #  - source: github://yourname/esphome-igrill@main )

esp32_ble_tracker:

ble_client:
  - mac_address: 70:91:8F:XX:XX:XX
    id: igrill_v2
    on_connect:
      then:
        - binary_sensor.template.publish:
            id: v2_connection_bin
            state: ON
    on_disconnect:
      then:
        - binary_sensor.template.publish:
            id: v2_connection_bin
            state: OFF

sensor:
  - platform: igrill
    ble_client_id: igrill_v2
    id: igrill_v2_component
    update_interval: 10s # default
    send_value_when_unplugged: true # default
    unplugged_probe_value: 0 # default
    battery_level:
      name: "IGrill v2 battery"
    temperature_probe1:
      name: "IGrill v2 temp probe 1"
      unit_of_measurement: "°C" # default
    temperature_probe2:
      name: "IGrill v2 temp probe 2"
      unit_of_measurement: "°C" # default
    temperature_probe3:
      name: "IGrill v2 temp probe 3"
      unit_of_measurement: "°C" # default
    temperature_probe4:
      name: "IGrill v2 temp probe 4"
      unit_of_measurement: "°C" # default

number:
  - platform: igrill
    igrill_id: igrill_v2_component
    temperature_threshold_probe1:
      name: "IGrill V2 target probe 1"
      min_value: 0
      max_value: 100
      step: 1
    temperature_threshold_probe2:
      name: "IGrill V2 target probe 2"
      min_value: 0
      max_value: 100
      step: 1
    temperature_threshold_probe3:
      name: "IGrill V2 target probe 3"
      min_value: 0
      max_value: 100
      step: 1
    temperature_threshold_probe4:
      name: "IGrill V2 target probe 4"
      min_value: 0
      max_value: 100
      step: 1

